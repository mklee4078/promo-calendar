    const app = initializeApp(firebaseConfig);

    // Firestore에서 실시간으로 행사 데이터 읽기
    const docRef = doc(db, "promo", "events");
    onSnapshot(docRef, (snap) => {
      if (snap.exists()) {
        const data = snap.data();
        if (data.list && window.__setFirebaseEvents) {
          window.__setFirebaseEvents(data.list);
        }
      }
    });

    // 행사 데이터 저장 함수 전역 등록
    window.__saveToFirebase = async (events) => {
      try {
        await setDoc(docRef, { list: events, updatedAt: new Date().toISOString() });
        return true;
      } catch(e) {
        console.error("Firebase 저장 오류:", e);
        return false;
      }
    };

  const now=TODAY, sd=s||"", ed=e||"";
  if(!sd||!ed) return {label:"예정",color:"#4f6ef7",bg:"#eef1fb"};
  if(now<sd) return {label:"예정",color:"#4f6ef7",bg:"#eef1fb"};

const inferType = (ev) => {
  if(ev.eventType) return ev.eventType;
  if(ev.importance==="L") return "launch";
  const name=(ev.name||"").toLowerCase();
  for(const [type,kws] of Object.entries(TYPE_KEYWORDS)){
    if(kws.some(k=>name.includes(k))) return type;
  }
  return "";
};

// ── ChannelManager ────────────────────────────────────
function ChannelManager({channels,onClose,onSave}) {
  const [list,setList] = useState(channels.map(c=>({...c})));
  const [newName,setNewName] = useState("");
  const add = () => {
    const n=newName.trim(); if(!n) return;
    if(list.find(c=>c.name===n)){alert("이미 있는 채널입니다.");return;}
    const maxId=Math.max(...list.map(c=>c.id),0);
    setList(l=>[...l,{id:maxId+1,name:n}]); setNewName("");
  };
  const remove = id => setList(l=>l.filter(c=>c.id!==id));
  const move = (id,dir) => setList(l=>{
    const i=l.findIndex(c=>c.id===id); if(i<0) return l;
    const n=[...l],j=i+dir; if(j<0||j>=n.length) return l;
    [n[i],n[j]]=[n[j],n[i]]; return n;
  });
  return (
    <div style={{position:"fixed",inset:0,background:"#00000060",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#fff",borderRadius:18,width:400,padding:28,boxShadow:"0 12px 50px #0004",maxHeight:"85vh",display:"flex",flexDirection:"column"}}>

        <div style={{fontSize:12,color:"#888",marginBottom:14}}>▲▼ 버튼으로 순서 조정, 채널 추가/삭제 가능합니다.</div>
        <div style={{overflowY:"auto",flex:1,marginBottom:14}}>
          {list.map((ch,i)=>(
            <div key={ch.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:8,marginBottom:4,background:i%2===0?"#f8f9fc":"#fff",border:"1px solid #edf0f6"}}>
              <div style={{width:10,height:10,borderRadius:3,background:CHAN_COLORS[i%CHAN_COLORS.length],flexShrink:0}}/>
              <span style={{flex:1,fontSize:13,fontWeight:600,color:"#334"}}>{ch.name}</span>
              <button onClick={()=>move(ch.id,-1)} disabled={i===0} style={{padding:"2px 7px",borderRadius:5,border:"1px solid #dde",background:"#f5f7fe",cursor:i===0?"default":"pointer",fontSize:11,color:i===0?"#ccc":"#556"}}>▲</button>
              <button onClick={()=>move(ch.id,1)} disabled={i===list.length-1} style={{padding:"2px 7px",borderRadius:5,border:"1px solid #dde",background:"#f5f7fe",cursor:i===list.length-1?"default":"pointer",fontSize:11,color:i===list.length-1?"#ccc":"#556"}}>▼</button>
              <button onClick={()=>remove(ch.id)} style={{padding:"2px 8px",borderRadius:5,border:"none",background:"#ffe8e8",cursor:"pointer",fontSize:11,color:"#e04"}}>삭제</button>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")add();}} placeholder="새 채널명 입력 후 Enter" style={{flex:1,padding:"8px 10px",borderRadius:8,border:"1.5px solid #dde",fontSize:13}}/>
          <button onClick={add} style={{padding:"8px 16px",borderRadius:8,border:"none",background:"#4f6ef7",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>추가</button>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{padding:"9px 22px",borderRadius:9,border:"1.5px solid #dde",background:"#fff",cursor:"pointer",fontSize:13,color:"#667"}}>취소</button>
          <button onClick={()=>{onSave(list);onClose();}} style={{padding:"9px 28px",borderRadius:9,border:"none",background:"#4f6ef7",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:800}}>저장</button>
        </div>
      </div>
    </div>
  );
}

// ── MonthView (월별 캘린더) ────────────────────────────

  const first = new Date(Y,month,1).getDay();
  const days = new Date(Y,month+1,0).getDate();
  const cells = Array(first).fill(null).concat(Array.from({length:days},(_,i)=>i+1));
  const compact = cells.length > 35;
  const allForDay = dk => events.filter(e=>{
    if(brand!=="전체"&&e.brand!==brand) return false;
    const nn=normalize(e.channel);
    return e.startDate<=dk&&e.endDate>=dk;
  });

  return (
    <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 12px #0001",overflow:"hidden",marginBottom:0}}>
      <div onClick={()=>toggleCollapse("month_"+month)} style={{background:`linear-gradient(135deg,${bc.tag},${bc.border}99)`,padding:"10px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
        <span style={{fontWeight:800,fontSize:17,color:"#fff"}}>{MONTH_NAMES[month]}</span>
        <span style={{fontSize:11,color:"#ffffffbb"}}>2026</span>
        <span style={{marginLeft:"auto",color:"#ffffffbb",fontSize:14}}>{collapsed["month_"+month]?"▶":"▼"}</span>
      </div>
      {!collapsed["month_"+month]&&<>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"#f8f9fc"}}>
          {WEEKDAYS.map((w,i)=><div key={w} style={{textAlign:"center",padding:"6px 0",fontSize:11,fontWeight:700,color:i===0?"#e05c5c":i===6?"#4f6ef7":"#889"}}>{w}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:"#edf0f6"}}>
          {cells.map((d,i)=>{
            if(!d) return <div key={"e"+i} style={{background:"#f2f3f8",minHeight:88}}/>;
            const dk=dkey(Y,month,d),hol=HOLIDAYS_2026[dk],evs=allForDay(dk);
            const dow=(first+d-1)%7,isToday=dk===TODAY;
            return (
              <div key={dk} style={{background:"#fff",minHeight:90,padding:"0 0 4px",outline:isToday?"2px solid #4f6ef7":"none",outlineOffset:"-1px",position:"relative"}}>
                <div style={{background:isToday?"#4f6ef7":dow===0||hol?"#fff0f0":dow===6?"#f0f4ff":"#f8f9fc",padding:"4px 5px 3px",marginBottom:3,borderBottom:`1px solid ${dow===0||hol?"#fce4e4":dow===6?"#e4eaff":"#edf0f6"}`,display:"flex",alignItems:"center",gap:4}}>
                  {isToday
                    ?<span style={{color:"#fff",fontSize:11,fontWeight:900,lineHeight:"18px"}}>TODAY {d}</span>
                    :<span style={{fontSize:14,fontWeight:900,color:hol?"#e05c5c":dow===0?"#e05c5c":dow===6?"#4f6ef7":"#334"}}>{d}</span>
                  }
                  {hol&&<span style={{fontSize:7,color:"#e05c5c",fontWeight:700}}>{hol}</span>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:2,padding:"0 3px"}}>
                  {(compact?evs.slice(0,3):evs).map(ev=>{
                    const ci=chanNames.indexOf(ev.channel),c=cc(ci<0?0:ci);
                    const isStart=ev.startDate===dk;
                    return (
                      <div key={ev.id} onClick={()=>openEdit(ev)}
                        style={{background:c+"1e",borderLeft:isStart?`3px solid ${c}`:"none",borderTop:`1px solid ${c}44`,borderBottom:`1px solid ${c}44`,borderRadius:isStart?"0 3px 3px 0":"0",padding:"1px 4px",fontSize:9,fontWeight:700,color:c,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",cursor:"pointer",display:"flex",alignItems:"center",gap:2}}>
                        {isStart
                          ?<><span style={{overflow:"hidden",textOverflow:"ellipsis",flex:1}}>[{ev.channel}] {ev.name}</span>{ev.importance&&ev.importance!=="0"&&<span style={{fontSize:7,background:IMP_COLOR[ev.importance]+"33",color:IMP_COLOR[ev.importance],borderRadius:2,padding:"0 2px",flexShrink:0}}>{IMP_STAR[ev.importance]}</span>}</>
                          :<span style={{overflow:"hidden",textOverflow:"ellipsis",flex:1,opacity:0.7}}>{ev.name}</span>
                        }
                      </div>
                    );
                  })}
                  {evs.length>3&&compact&&<div style={{fontSize:8,color:"#889",textAlign:"right",paddingRight:2}}>+{evs.length-3}건</div>}
                </div>
              </div>
            );
          })}
        </div>
      </>}
    </div>
  );
}

// ── ChannelView (채널별 타임라인) ─────────────────────
function ChannelView({month,events,brand,channels,chanNames,bc,collapsed,toggleCollapse,openEdit}) {
  const Y2=Y, days=new Date(Y2,month+1,0).getDate();
  const dateArr=Array.from({length:days},(_,i)=>i+1);
  const ChW=72, CW=28;
  const [chOrder,setChOrder] = useState(()=>channels.map((_,i)=>i));
  const [dragging,setDragging] = useState({on:false});
  const [tooltip,setTooltip] = useState(null);
  const [showChanMgr,setShowChanMgr] = useState(false);
  const [dragPos,setDragPos] = useState(null);
  const containerRef = useRef(null);
  const sepAfter = channels.reduce((acc,ch,i)=>(isMain(ch.name)?i:acc),-1);

  const eForDay=(ch,dk)=>events.filter(e=>{
    if(brand!=="전체"&&e.brand!==brand) return false;
    return normalize(e.channel)===normalize(ch.name)&&e.startDate<=dk&&e.endDate>=dk;
  });

  const onRowMouseDown=(ci,e)=>{
    e.preventDefault();
    setDragging({on:true,fromIdx:ci,overIdx:ci});
    const onMove=ev=>{
      const rows=containerRef.current?.querySelectorAll("[data-chrow]");
      if(!rows) return;
      let newOver=-1;
      rows.forEach(r=>{ const rect=r.getBoundingClientRect(); if(ev.clientY>=rect.top&&ev.clientY<rect.bottom) newOver=parseInt(r.dataset.chrow); });
      if(newOver>=0) setDragging(d=>({...d,overIdx:newOver}));
    };
    const onUp=()=>{
      setDragging(d=>{
        if(d.on&&d.fromIdx!==d.overIdx){
          setChOrder(prev=>{
            const n=[...prev];
            const [m]=n.splice(d.fromIdx,1);
            n.splice(d.overIdx,0,m);
            return n;
          });
        }
        return {on:false};
      });
      document.removeEventListener("mousemove",onMove);
      document.removeEventListener("mouseup",onUp);
    };
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
  };

  const orderedChs = chOrder.map(i=>channels[i]);

  return (
    <div ref={containerRef} style={dragPos?{position:"fixed",left:dragPos.x,top:dragPos.y,width:dragPos.w,zIndex:200,background:"#fff",borderRadius:12,boxShadow:"0 8px 40px #0003"}:{background:"#fff",borderRadius:12,boxShadow:"0 2px 12px #0001",overflow:"hidden"}}>
      <div style={{background:`linear-gradient(135deg,${bc.tag},${bc.border}99)`,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontWeight:800,fontSize:15,color:"#fff"}}>⠿ {MONTH_NAMES[month]} — 채널별 캘린더</span>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {dragPos&&<button onClick={()=>setDragPos(null)} style={{background:"#ffffff33",border:"none",borderRadius:7,padding:"4px 10px",color:"#fff",fontSize:11,cursor:"pointer"}}>고정</button>}
          <button onClick={()=>setShowChanMgr(true)} style={{background:"#ffffff33",border:"none",borderRadius:7,padding:"4px 10px",color:"#fff",fontSize:11,cursor:"pointer"}}>️ 채널</button>
          <button onClick={()=>toggleCollapse("chanview_"+month)} style={{background:"#ffffff33",border:"none",borderRadius:7,padding:"4px 10px",color:"#fff",fontSize:13,cursor:"pointer"}}>{collapsed["chanview_"+month]?"▶":"▼"}</button>
        </div>
      </div>
      {!collapsed["chanview_"+month]&&<div style={{overflowX:"auto"}}>
        <div style={{minWidth:ChW+days*CW}}>
          {/* 날짜 헤더 */}
          <div style={{display:"flex",borderBottom:"1px solid #e0e5f0"}}>
            <div style={{minWidth:ChW,flexShrink:0,background:"#f0f2f8",display:"flex",alignItems:"center",paddingLeft:8,fontSize:10,fontWeight:700,color:"#889",borderRight:"2px solid #d0d8f0",height:40}}>채널</div>
            <div style={{display:"flex",background:"#f0f2f8",flex:1}}>
              {dateArr.map(d=>{
                const dk=dkey(Y2,month,d),dow=new Date(Y2,month,d).getDay(),isHol=!!HOLIDAYS_2026[dk],isTd=dk===TODAY;
                return <div key={d} style={{minWidth:CW,width:CW,height:40,textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:isTd?900:600,color:isTd?"#fff":isHol?"#e05c5c":dow===0?"#e05c5c":dow===6?"#4f6ef7":"#778",background:isTd?"#4f6ef7":isHol?"#fff0f0":dow===6?"#f0f4ff":"transparent",borderLeft:dow===1?"2px solid #dde":"none",boxSizing:"border-box"}}>{d}</div>;
              })}
            </div>
          </div>
          {/* 채널 행 */}
          {orderedChs.map((ch,ci)=>{
            const isDraggingThis=dragging.on&&dragging.fromIdx===ci;
            const isDraggingOver=dragging.on&&dragging.overIdx===ci&&dragging.fromIdx!==ci;
            const isMainCh=isMain(ch.name);
            return (
              <React.Fragment key={ch.id}>
                <div data-chrow={ci} style={{display:"flex",height:34,borderBottom:"1px solid #f0f2f8",opacity:isDraggingThis?0.4:1,background:isDraggingOver?"#dce8ff":isMainCh?"#fff":"#f8f9fc",transition:"background 0.1s",position:"relative"}}>
                  <div onMouseDown={e=>onRowMouseDown(ci,e)}
                    style={{minWidth:ChW,flexShrink:0,display:"flex",alignItems:"center",paddingLeft:6,borderRight:"2px solid #d0d8f0",borderLeft:`3px solid ${cc(ci)}`,fontSize:11,fontWeight:700,color:isMainCh?"#334":"#778",cursor:"grab",userSelect:"none",background:isDraggingOver?"#dce8ff":isMainCh?"#fafbff":"#f4f5fa"}}>
                    <span style={{fontSize:10,color:"#bbb",marginRight:5,flexShrink:0}}>⠿</span>
                    
                    <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ch.name}</span>
                  </div>
                  {dateArr.map(d=>{
                    const dk=dkey(Y2,month,d),evs=eForDay(ch,dk);
                    const dow=new Date(Y2,month,d).getDay(),isHol=!!HOLIDAYS_2026[dk];
                    return (
                      <div key={dk} style={{minWidth:CW,width:CW,borderRight:"1px solid #e8ecf4",position:"relative",overflow:"hidden",background:isHol?"#fff8f8":dow===6?"#f8f8ff":dow===0?"#fff8f8":"transparent"}}
                        onMouseEnter={e=>{if(evs.length&&!dragging.on)setTooltip({evs,x:e.clientX,y:e.clientY,dk,ch:ch.name});}}
                        onMouseLeave={()=>setTooltip(null)}>
                        {evs.length>0&&(()=>{
                          const mainEv=evs.slice().sort((a,b)=>(b.importance||"0").localeCompare(a.importance||"0"))[0];
                          const mainIsStart=mainEv.startDate===dk;
                          const mc=cc(chanNames.indexOf(mainEv.channel)<0?ci:chanNames.indexOf(mainEv.channel));
                          return <div onClick={()=>!dragging.on&&openEdit(mainEv)} style={{position:"absolute",inset:"2px 0",background:mc+"22",borderLeft:mainIsStart?`2px solid ${mc}`:"none",cursor:"pointer",display:"flex",alignItems:"center",overflow:"hidden"}}>
                            <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,fontSize:8,fontWeight:700,color:mc,paddingLeft:mainIsStart?2:0}}>{mainIsStart?mainEv.name:""}</span>
                            {mainIsStart&&mainEv.importance&&mainEv.importance!=="0"&&<span style={{fontSize:7,background:IMP_COLOR[mainEv.importance]+"33",color:IMP_COLOR[mainEv.importance],borderRadius:2,padding:"0 2px",flexShrink:0}}>{IMP_STAR[mainEv.importance]}</span>}
                            {evs.length>1&&<span style={{background:mc,color:"#fff",borderRadius:2,padding:"0 3px",fontSize:7,flexShrink:0,marginRight:1}}>+{evs.length}</span>}
                          </div>;
                        })()}
                      </div>
                    );
                  })}
                </div>
                
              </React.Fragment>
            );
          })}
        </div>
      </div>}
      {/* 툴팁 */}
      {tooltip&&(
        <div style={{position:"fixed",left:tooltip.x+14,top:tooltip.y-12,background:"#fff",borderRadius:10,boxShadow:"0 4px 20px #0003",padding:"10px 14px",zIndex:800,minWidth:180,pointerEvents:"none"}}>
          <div style={{fontWeight:700,color:"#445",marginBottom:6,fontSize:11,borderBottom:"1px solid #f0f2f8",paddingBottom:5}}>
            {tooltip.dk} · <span style={{color:cc(chanNames.indexOf(tooltip.ch))}}>{tooltip.ch}</span>
          </div>
          {tooltip.evs.map(ev=>(
            <div key={ev.id} style={{marginBottom:5,paddingBottom:5,borderBottom:"1px solid #f8f9fc"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                <ImpBadge val={ev.importance}/>
                <span style={{fontWeight:700,color:"#334"}}>{ev.name}{ev.coupon?` ${ev.coupon}%쿠폰`:""}</span>
              </div>
              {ev.manager&&<div style={{fontSize:10,color:"#889"}}>{ev.manager}</div>}
              <div style={{fontSize:10,color:"#aaa"}}>{ev.startDate} ~ {ev.endDate}</div>
            </div>
          ))}
        </div>
      )}
      {showChanMgr&&<ChannelManager channels={channels} onClose={()=>setShowChanMgr(false)} onSave={list=>{/* handled by parent */}}/>}
    </div>
  );
}

// ── EventList (행사 목록) ─────────────────────────────
// ── ManagerTab 담당자 관리 ────────────────────────────────────
// ── ChannelDashboard (채널별 대시보드) ──────────────────
function ChannelDashboard({channel,events,brand,bc,jasaMemos,saveJasaMemo,channelStrats,setChannelStrats,saveStrat}) {
  const [selMonth,setSelMonth] = React.useState(null); // null=연간뷰
  const [memoModal,setMemoModal] = React.useState(null);
  const [memoText,setMemoText] = React.useState("");
  const [editStrat,setEditStrat] = React.useState(false);
  const [stratForm,setStratForm] = React.useState(null);
  const TODAY_STR = new Date().toISOString().slice(0,10);
  const y=2026, m=selMonth??0;
  const monthStr = selMonth!=null ? `${y}-${String(m+1).padStart(2,"0")}` : "";
  const daysInMonth = selMonth!=null ? new Date(y,m+1,0).getDate() : 31;
  const WEEK_LABELS=["일","월","화","수","목","금","토"];

  // 이 채널 행사 (브랜드 필터)
  const chEvs = events.filter(e=>e.channel===channel&&(brand==="전체"||e.brand===brand));
      const monthEvs = selMonth!=null ? chEvs.filter(e=>e.startDate<=`${monthStr}-${String(daysInMonth).padStart(2,"0")}`&&e.endDate>=`${monthStr}-01`) : [];

  // 겹침: 같은 브랜드+키워드(행사명)가 이 채널과 다른 채널에서 동시 시작 (해당 월만)
  const overlapItems = [];
  const thisMonthChEvs = events.filter(e=>
    e.channel===channel &&
    e.startDate.startsWith(monthStr) &&
    (brand==="전체"||e.brand===brand)
  );
  thisMonthChEvs.forEach(ev=>{
    if(ev.importance==="L"||ev.importance==="0"||!ev.importance) return; // 발매/일반 제외
    // 같은 브랜드, 같은 행사명, 다른 채널, 같은 시작일
    const sameKw = events.filter(e=>
      e.brand===ev.brand &&
      e.channel!==channel &&
      e.startDate===ev.startDate &&
      e.name===ev.name &&
      e.importance!=="L" && e.importance!=="0" && e.importance
    );
    if(sameKw.length>0){
      const otherChs=[...new Set(sameKw.map(e=>e.channel))].join(", ");
      overlapItems.push({date:ev.startDate,brand:ev.brand,name:ev.name,channels:otherChs});
    }
  });
  const overlapDays=[...new Set(overlapItems.map(o=>o.date))].sort();

  // 달성률
  const cbTgt=chEvs.filter(e=>e.brand==="시티브리즈"&&e.startDate.startsWith(monthStr)&&e.targetSales).reduce((s,e)=>s+Number(e.targetSales),0);
  const cbAct=chEvs.filter(e=>e.brand==="시티브리즈"&&e.startDate.startsWith(monthStr)&&e.actualSales).reduce((s,e)=>s+Number(e.actualSales),0);
  const atTgt=chEvs.filter(e=>e.brand==="아티드"&&e.startDate.startsWith(monthStr)&&e.targetSales).reduce((s,e)=>s+Number(e.targetSales),0);
  const atAct=chEvs.filter(e=>e.brand==="아티드"&&e.startDate.startsWith(monthStr)&&e.actualSales).reduce((s,e)=>s+Number(e.actualSales),0);

  // 이달 전략
  const strats = channelStrats[channel]||{};
  const mi = strats[m+1] || null;

  // 전략 편집 시작
  const startEdit = () => {
    setStratForm(mi ? {...mi, tac:[...(mi.tac||["","",""])] } : {ev:"",focus:"",kw:"",tgt:"",tcb:"",tat:"",per:"",tac:["","",""]});
    setEditStrat(true);
  };
  const saveEdit = () => {
    saveStrat(channel, m+1, {...stratForm});
    setEditStrat(false);
  };

  // 엑셀 내보내기 (전략)
  const exportStrats = () => {
    const rows=[["채널","월","이벤트명","포커스","키워드","목표","CT목표","AT목표","기간","전략1","전략2","전략3"]];
    Object.entries(channelStrats).forEach(([ch,months])=>{
      Object.entries(months).forEach(([mon,s])=>{
        rows.push([ch,mon+"월",s.ev||"",s.focus||"",s.kw||"",s.tgt||"",s.tcb||"",s.tat||"",s.per||"",...(s.tac||[])]);
      });
    });
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb,ws,"채널전략");
    XLSX.writeFile(wb,`채널전략_2026.xlsx`);
  };

  // 엑셀 불러오기
  const importStrats = (e) => {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const wb=XLSX.read(ev.target.result,{type:"binary"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1}).slice(1);
      const newStrats={...channelStrats};
      rows.forEach(r=>{
        if(!r[0]||!r[1]) return;
        const ch=String(r[0]); const mon=parseInt(r[1]);
        if(!newStrats[ch]) newStrats[ch]={};
        newStrats[ch][mon]={ev:r[2]||"",focus:r[3]||"",kw:r[4]||"",tgt:r[5]||"",tcb:r[6]||"",tat:r[7]||"",per:r[8]||"",tac:[r[9]||"",r[10]||"",r[11]||""]};
      });
      setChannelStrats(newStrats); saveLS("channel_strats_v3",newStrats);
    };
    reader.readAsBinaryString(file);
    e.target.value="";
  };

  const AchBar=({label,target,actual,color})=>{
    const rate=target>0?Math.round(actual/target*100):null;
    return(<div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,fontWeight:700,marginBottom:4}}>
        <span style={{color}}>{label}</span>
        <span style={{color:"#556"}}>{rate!=null?`${rate}%`:"-"}{target>0?` / 목표 ${(target/100000000).toFixed(1)}억`:""}</span>
      </div>
      <div style={{height:8,borderRadius:4,background:"#eee",overflow:"hidden"}}>
        <div style={{height:"100%",borderRadius:4,background:color,width:`${Math.min(rate||0,100)}%`,transition:"width 0.4s"}}/>
      </div>
      {actual>0&&<div style={{fontSize:10,color:"#888",marginTop:2,textAlign:"right"}}>실적 {(actual/100000000).toFixed(2)}억</div>}
    </div>);
  };

  // 캘린더 셀
  const firstDay=new Date(y,m,1).getDay();
  const cells=Array(firstDay).fill(null).concat(Array.from({length:daysInMonth},(_,i)=>i+1));
  const openMemo=ds=>{setMemoModal({date:ds});setMemoText(jasaMemos[ds]||"");};

  // ── 연간 전략 테이블 ──
  const AnnualView = () => {
    const strats = channelStrats[channel]||{};
    const parseAmt=v=>{if(!v)return 0;const s=String(v).replace(/[^0-9.]/g,'');const n=parseFloat(s)||0;return String(v).includes('억')?n*100000000:String(v).includes('만')?n*10000:n;};
    const tgtKey=brand==="시티브리즈"?"tcb":brand==="아티드"?"tat":"tgt";
    const annTgt=Object.values(strats).reduce((s,m)=>s+parseAmt(m[tgtKey]||m.tgt),0);
    const stratAct=Object.values(strats).reduce((s,m)=>s+parseAmt(m.act),0);
    // strats.act 없으면 MONTHLY_ACTUAL_PRESET 합산 사용
    const presetActArr=MONTHLY_ACTUAL_PRESET[brand==="전체"?"전체":brand]||[];
    const presetAct=presetActArr.reduce((s,v)=>s+(v||0),0);
    const annAct=stratAct>0?stratAct:presetAct;
    const annRate=annTgt>0?Math.round(annAct/annTgt*100):null;
    const channels_list = ["자사몰","29CM","W컨셉","무신사","지그재그"];
    return (
      <>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}><div style={{background:"#fff",borderRadius:10,boxShadow:"0 2px 8px #0001",padding:"14px 18px",textAlign:"center"}}><div style={{fontSize:11,color:"#889",marginBottom:4}}>연간 목표</div><div style={{fontSize:22,fontWeight:900,color:"#27ae60"}}>{annTgt>0?(annTgt/100000000).toFixed(1)+"억":"-"}</div></div><div style={{background:"#fff",borderRadius:10,boxShadow:"0 2px 8px #0001",padding:"14px 18px",textAlign:"center"}}><div style={{fontSize:11,color:"#889",marginBottom:4}}>연간 실적</div><div style={{fontSize:22,fontWeight:900,color:"#e67e22"}}>{annAct>0?(annAct/100000000).toFixed(2)+"억":"-"}</div></div><div style={{background:"#fff",borderRadius:10,boxShadow:"0 2px 8px #0001",padding:"14px 18px",textAlign:"center"}}><div style={{fontSize:11,color:"#889",marginBottom:4}}>달성률</div><div style={{fontSize:22,fontWeight:900,color:"#4f6ef7"}}>{annRate!=null?annRate+"%":"-"}</div></div></div><div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 10px #0001",overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead>
            <tr style={{background:"#f4f6fb"}}>
              <th style={{padding:"10px 14px",textAlign:"left",fontWeight:800,color:"#334",borderBottom:"2px solid #e0e4f0",width:60}}>월</th>
              <th style={{padding:"10px 14px",textAlign:"left",fontWeight:800,color:"#334",borderBottom:"2px solid #e0e4f0",width:140}}>이벤트명</th>
              <th style={{padding:"10px 14px",textAlign:"left",fontWeight:800,color:"#334",borderBottom:"2px solid #e0e4f0"}}>포커스</th>
              <th style={{padding:"10px 14px",textAlign:"left",fontWeight:800,color:"#334",borderBottom:"2px solid #e0e4f0",width:80}}>기간</th>
              <th style={{padding:"10px 14px",textAlign:"right",fontWeight:800,color:"#334",borderBottom:"2px solid #e0e4f0",width:70}}>목표</th>
              <th style={{padding:"10px 14px",textAlign:"right",fontWeight:800,color:"#334",borderBottom:"2px solid #e0e4f0",width:65}}>CT</th>
              <th style={{padding:"10px 14px",textAlign:"right",fontWeight:800,color:"#334",borderBottom:"2px solid #e0e4f0",width:65}}>AT</th>
              <th style={{padding:"10px 14px",textAlign:"right",fontWeight:800,color:"#e67e22",borderBottom:"2px solid #e0e4f0",width:70}}>실적</th><th style={{padding:"10px 14px",textAlign:"right",fontWeight:800,color:"#27ae60",borderBottom:"2px solid #e0e4f0",width:65}}>달성률</th><th style={{padding:"10px 14px",textAlign:"left",fontWeight:800,color:"#334",borderBottom:"2px solid #e0e4f0"}}>핵심 액션</th>
            </tr>
          </thead>
          <tbody>
            {Array.from({length:12},(_,i)=>i+1).map(mn=>{
              const s = strats[mn];
              const isCurrentMonth = mn === (new Date().getMonth()+1);
              return (
                <tr key={mn} style={{borderBottom:"1px solid #f0f2f8",background:isCurrentMonth?"#fff8f0":"#fff"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#f8f9ff"}
                  onMouseLeave={e=>e.currentTarget.style.background=isCurrentMonth?"#fff8f0":"#fff"}>
                  <td style={{padding:"10px 14px",fontWeight:800,color:isCurrentMonth?"#e67e22":"#556",cursor:"pointer"}}
                    onClick={()=>setSelMonth(mn-1)}>
                    {mn}월{isCurrentMonth&&<span style={{fontSize:9,background:"#e67e22",color:"#fff",borderRadius:4,padding:"1px 5px",marginLeft:4}}>현재</span>}
                  </td>
                  {s ? (<>
                    <td style={{padding:"10px 14px",fontWeight:700,color:"#334"}}>{s.ev||"-"}</td>
                    <td style={{padding:"10px 14px",color:"#556"}}>{s.focus||"-"}</td>
                    <td style={{padding:"10px 14px",color:"#889",fontSize:11}}>{s.per||"-"}</td>
                    <td style={{padding:"10px 14px",textAlign:"right",fontWeight:700,color:"#27ae60"}}>{s.tgt||"-"}</td>
                    <td style={{padding:"10px 14px",textAlign:"right",color:"#4f6ef7",fontSize:11}}>{s.tcb||"-"}</td>
                    <td style={{padding:"10px 14px",textAlign:"right",color:"#e67e22",fontSize:11}}>{s.tat||"-"}</td>
                    <td style={{padding:"10px 14px",textAlign:"right",color:"#e67e22",fontWeight:700}}>{(()=>{const ms=strats[mn];const sv=ms&&ms.act?parseAmt(ms.act):0;if(sv>0) return (sv/100000000).toFixed(2)+"억";const pArr=MONTHLY_ACTUAL_PRESET[brand==="전체"?"전체":brand]||[];const pv=pArr[mn-1];return pv!=null?(pv/100000000).toFixed(2)+"억":"-";})()}</td><td style={{padding:"10px 14px",textAlign:"right",color:"#556"}}>{(()=>{const ms=strats[mn];const t=ms?parseAmt(ms[tgtKey]||ms.tgt):0;const sv=ms&&ms.act?parseAmt(ms.act):0;const pArr=MONTHLY_ACTUAL_PRESET[brand==="전체"?"전체":brand]||[];const a=sv>0?sv:(pArr[mn-1]??0);return t>0?Math.round(a/t*100)+"%":"-";})()}</td><td style={{padding:"10px 14px",color:"#667",fontSize:11}}>
                      {(s.tac||[]).filter(t=>t).map((t,i)=><div key={i} style={{marginBottom:2}}>· {t}</div>)}
                    </td>
                  </>) : (
                    <td colSpan={9} style={{padding:"10px 14px",color:"#ccc",fontSize:11,textAlign:"center"}}>
                      전략 미입력 — <span style={{color:"#e67e22",cursor:"pointer"}} onClick={()=>setSelMonth(mn-1)}>편집하기</span>
                    </td>
                  )}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      </>
    );
  };

  return(
    <div style={{maxWidth:1300,margin:"0 auto"}}>
      {/* 헤더 */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexWrap:"wrap"}}>
        <div style={{fontWeight:900,fontSize:18,color:"#334"}}>{channel} 채널 대시보드</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",flex:1}}>
          <button onClick={()=>setSelMonth(null)}
            style={{padding:"4px 12px",borderRadius:16,border:"none",fontWeight:700,fontSize:12,cursor:"pointer",
              background:selMonth===null?"#334":"#e8ecf4",color:selMonth===null?"#fff":"#667"}}>연간</button>
          {MONTH_NAMES.map((mn,i)=>(
            <button key={i} onClick={()=>setSelMonth(i)}
              style={{padding:"4px 12px",borderRadius:16,border:"none",fontWeight:700,fontSize:12,cursor:"pointer",
                background:selMonth===i?"#e67e22":"#e8ecf4",color:selMonth===i?"#fff":"#667"}}>{mn}</button>
          ))}
        </div>
        <button onClick={exportStrats} style={{padding:"5px 12px",borderRadius:8,border:"1.5px solid #e67e22",background:"#fff",color:"#e67e22",fontSize:11,fontWeight:700,cursor:"pointer"}}>전채널 전략 엑셀다운</button>
        <label style={{padding:"5px 12px",borderRadius:8,border:"1.5px solid #27ae60",background:"#fff",color:"#27ae60",fontSize:11,fontWeight:700,cursor:"pointer"}}>
          전채널 전략 엑셀업로드<input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={importStrats}/>
        </label>
      </div>

      {/* 연간 뷰 또는 월별 뷰 */}
      {selMonth===null ? <AnnualView/> : <>
      {/* 1행: 시즌전략 + 달성률 */}
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:14,marginBottom:14}}>
        {/* 시즌 전략 */}
        <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 10px #0001",padding:"16px 20px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:800,color:"#667"}}>{m+1}월 시즌 전략</div>
            <button onClick={startEdit} style={{fontSize:10,padding:"3px 10px",borderRadius:6,border:"1.5px solid #e67e22",background:"#fff",color:"#e67e22",fontWeight:700,cursor:"pointer"}}>편집</button>
          </div>
          {editStrat&&stratForm?(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {[["이벤트명","ev"],["포커스","focus"],["키워드","kw"],["목표(전체)","tgt"],["CT목표","tcb"],["AT목표","tat"],["기간","per"]].map(([lbl,key])=>(
                <div key={key}>
                  <div style={{fontSize:10,color:"#aaa",fontWeight:700,marginBottom:2}}>{lbl}</div>
                  <input value={stratForm[key]||""} onChange={e=>setStratForm(f=>({...f,[key]:e.target.value}))}
                    style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1.5px solid #dde",fontSize:12,boxSizing:"border-box"}}/>
                </div>
              ))}
              <div style={{gridColumn:"1/-1"}}>
                <div style={{fontSize:10,color:"#aaa",fontWeight:700,marginBottom:4}}>전략 포인트</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                  {(stratForm.tac||["","",""]).map((t,i)=>(
                    <input key={i} value={t} onChange={e=>setStratForm(f=>({...f,tac:f.tac.map((v,j)=>j===i?e.target.value:v)}))}
                      placeholder={`전략 ${i+1}`}

                  ))}
                </div>
              </div>
              <div style={{gridColumn:"1/-1",display:"flex",gap:6,justifyContent:"flex-end"}}>

                <button onClick={saveEdit} style={{padding:"5px 14px",borderRadius:7,border:"none",background:"#e67e22",color:"#fff",fontSize:11,fontWeight:800,cursor:"pointer"}}>저장</button>

                  {mi.kw&&<span style={{fontSize:10,background:"#eef1fb",color:"#4f6ef7",borderRadius:4,padding:"2px 8px",fontWeight:700}}>{mi.kw}</span>}
                  {mi.tgt&&<span style={{fontSize:10,background:"#f0fdf4",color:"#27ae60",borderRadius:4,padding:"2px 8px",fontWeight:700}}>목표 {mi.tgt}</span>}

                  {mi.tcb&&<span style={{fontSize:10,background:"#f0f0f0",color:"#667",borderRadius:4,padding:"2px 8px",fontWeight:700}}>CT {mi.tcb}</span>}

function ManagerTab({managers,events,saveManagers,saveEvents,bc,chanNames=[]}) {
  const [newName,setNewName] = React.useState("");
  const [editIdx,setEditIdx] = React.useState(null);
  const [editVal,setEditVal] = React.useState("");
  const [confirmDel,setConfirmDel] = React.useState(null);
  const [mapBrand,setMapBrand] = React.useState("시티브리즈");
  const [mapChannel,setMapChannel] = React.useState("자사몰");
  const [mapMgr,setMapMgr] = React.useState("");
  const [mgMapping,setMgMapping] = React.useState(()=>{
    const saved=loadLS("mgr_mapping_v1",null);
    return saved||{...DEFAULT_MANAGERS};
  });
  const saveMapping = (m) => { setMgMapping(m); saveLS("mgr_mapping_v1",m); };

  const addManager = () => {
    const n = newName.trim();
    if(!n) return;
    if(managers.includes(n)){alert("이미 있는 담당자예요.");return;}
    saveManagers([...managers,n]);
    setNewName("");
  };

  const startEdit = (idx) => { setEditIdx(idx); setEditVal(managers[idx]); };

  const confirmEdit = () => {
    const n = editVal.trim();
    if(!n) return;
    const old = managers[editIdx];
    saveManagers(managers.map((m,i)=>i===editIdx?n:m));
    saveEvents(events.map(e=>e.manager===old?{...e,manager:n}:e));
    setEditIdx(null);
  };

  const doDelete = () => {
    if(!confirmDel) return;
    const old = managers[confirmDel];
    saveManagers(managers.filter((_,i)=>i!==confirmDel));
    setConfirmDel(null);
  };

  const setMap = () => {
    if(!mapMgr) return;
    const m = {...mgMapping};
    if(!m[mapChannel]) m[mapChannel]={};
    m[mapChannel][mapBrand] = mapMgr;
    saveMapping(m);
  };

  const delMap = (ch,br) => {
    const m = JSON.parse(JSON.stringify(mgMapping));
    if(m[ch]&&m[ch][br]) { delete m[ch][br]; if(!Object.keys(m[ch]).length) delete m[ch]; }
    saveMapping(m);
  };

  const countByMgr = {};
  events.forEach(e=>{if(e.manager) countByMgr[e.manager]=(countByMgr[e.manager]||0)+1;});

  const CHANNELS = chanNames.length>0?chanNames:["자사몰","29CM","W컨셉","무신사","지그재그","브론테","롯데온","하고","EQL","네이버","MKT"];
  const BRANDS = ["시티브리즈","아티드"];

  return (
    <div style={{padding:"24px 0",display:"flex",gap:24,flexWrap:"wrap",alignItems:"flex-start"}}>
      <div style={{background:"#fff",borderRadius:16,boxShadow:"0 2px 16px #0001",padding:"28px 32px",minWidth:340,flex:1}}>
        <div style={{fontSize:14,fontWeight:800,color:"#334",marginBottom:20}}>담당자 목록</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:28}}>
          {managers.map((m,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:10,background:"#f8f9fc",border:"1px solid #e8ecf4"}}>
              {editIdx===i
                ? <>
                    <input value={editVal} onChange={e=>setEditVal(e.target.value)}
                      onKeyDown={e=>e.key==="Enter"&&confirmEdit()}
                      style={{flex:1,border:"1.5px solid "+bc.tag,borderRadius:7,padding:"5px 10px",fontSize:13,fontWeight:600,outline:"none"}}/>
                    <button onClick={confirmEdit} style={{padding:"5px 14px",borderRadius:7,border:"none",background:bc.tag,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>저장</button>
                    <button onClick={()=>setEditIdx(null)} style={{padding:"5px 12px",borderRadius:7,border:"1px solid #ccc",background:"#fff",fontSize:12,cursor:"pointer"}}>취소</button>
                  </>
                : <>
                    <span style={{flex:1,fontSize:13,fontWeight:600,color:"#334"}}>{m}</span>
                    <span style={{fontSize:11,color:"#aab",marginRight:4}}>{countByMgr[m]||0}건</span>
                    <button onClick={()=>startEdit(i)} style={{padding:"4px 12px",borderRadius:7,border:"1px solid #e0e5f0",background:"#fff",fontSize:11,cursor:"pointer"}}>수정</button>
                    <button onClick={()=>setConfirmDel(i)} style={{padding:"4px 10px",borderRadius:7,border:"none",background:"#fee",color:"#e53935",fontSize:11,fontWeight:700,cursor:"pointer"}}>삭제</button>
                  </>
              }
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <input value={newName} onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&addManager()}
            placeholder="새 담당자 이름 (예: 홍길동 선임)"
            style={{flex:1,border:"1.5px solid #e0e5f0",borderRadius:9,padding:"9px 14px",fontSize:13,outline:"none"}}/>
          <button onClick={addManager} style={{padding:"9px 18px",borderRadius:9,border:"none",background:bc.tag,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>추가</button>
        </div>
      </div>

      <div style={{background:"#fff",borderRadius:16,boxShadow:"0 2px 16px #0001",padding:"28px 32px",minWidth:440,flex:2}}>
        <div style={{fontSize:14,fontWeight:800,color:"#334",marginBottom:6}}>브랜드 · 채널별 담당자 매핑</div>
        <div style={{fontSize:11,color:"#aab",marginBottom:18}}>업로드 시 담당자 공란이면 아래 설정으로 자동 매칭됨</div>
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          <select value={mapBrand} onChange={e=>setMapBrand(e.target.value)}
            style={{border:"1.5px solid #e0e5f0",borderRadius:8,padding:"7px 10px",fontSize:12,outline:"none"}}>
            {BRANDS.map(b=><option key={b} value={b}>{b}</option>)}
          </select>
          <select value={mapChannel} onChange={e=>setMapChannel(e.target.value)}
            style={{border:"1.5px solid #e0e5f0",borderRadius:8,padding:"7px 10px",fontSize:12,outline:"none"}}>
            {CHANNELS.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <select value={mapMgr} onChange={e=>setMapMgr(e.target.value)}
            style={{border:"1.5px solid #e0e5f0",borderRadius:8,padding:"7px 10px",fontSize:12,outline:"none",flex:1,minWidth:120}}>
            <option value="">담당자 선택</option>
            {managers.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
          <button onClick={setMap} style={{padding:"7px 18px",borderRadius:8,border:"none",background:bc.tag,color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>설정</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:400,overflowY:"auto"}}>
          {Object.entries(mgMapping).sort().map(([ch,bmap])=>
            Object.entries(bmap).map(([br,mgr])=>(
              <div key={ch+br} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:9,background:"#f8f9fc",border:"1px solid #e8ecf4",fontSize:12}}>
                <span style={{color:"#667",minWidth:60}}>{br}</span>
                <span style={{color:bc.tag,fontWeight:700,minWidth:80,flexShrink:0}}>{ch}</span>
                <span style={{flex:1,color:"#334",fontWeight:600}}>{mgr}</span>
                <button onClick={()=>delMap(ch,br)} style={{padding:"3px 10px",borderRadius:6,border:"none",background:"#fee",color:"#e53935",fontSize:11,fontWeight:700,cursor:"pointer"}}>삭제</button>
              </div>
            ))
          )}
        </div>
      </div>

      {confirmDel!==null&&(
        <div style={{position:"fixed",inset:0,background:"#0005",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setConfirmDel(null)}>
          <div style={{background:"#fff",borderRadius:16,padding:"28px 32px",minWidth:320,boxShadow:"0 8px 40px #0003"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:15,fontWeight:800,color:"#334",marginBottom:8}}>담당자 삭제</div>
            <div style={{fontSize:13,color:"#667",marginBottom:24}}>{"["+managers[confirmDel]+"] 담당자를 삭제할까요?"}</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setConfirmDel(null)} style={{flex:1,padding:"9px 0",borderRadius:8,border:"1.5px solid #e0e5f0",background:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>취소</button>
              <button onClick={doDelete} style={{flex:1,padding:"9px 0",borderRadius:8,border:"none",background:"#e53935",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>삭제</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function EventList({events,brand,channels,chanNames,bc,collapsed,toggleCollapse,openEdit,openQuick,saveLS,saveEvents,managers}) {
  const [listSort,setListSort] = useState("date");
  const [statusF,setStatusF] = useState([]);
  const [impF,setImpF] = useState([]);
  const [chF,setChF] = useState([]);
  const [typeF,setTypeF] = useState([]);
  const [selectedIds,setSelectedIds] = useState(new Set());
  const [editCell,setEditCell] = useState(null);
  const [sortKey,setSortKey] = useState(null);
  const [sortDir,setSortDir] = useState('asc');
  const [cellCal,setCellCal] = useState(null);
  const [calMon,setCalMon] = useState({y:Y,m:new Date().getMonth()});
  const [uploadMsg,setUploadMsg] = useState("");
  const listUploadRef = useRef(null);

  const allChsInBrand = [...new Set(events.filter(e=>brand==="전체"||e.brand===brand).map(e=>e.channel))].sort();

  let rows = events.filter(e=>brand==="전체"||e.brand===brand);
  rows = rows.filter(e=>{
    const statusOk=statusF.length===0||statusF.includes(getStatus(e.startDate,e.endDate).label);
    const impOk=impF.length===0||impF.includes(e.importance);
    const chOk=chF.length===0||chF.includes(e.channel);
    const typeOk=typeF.length===0||typeF.includes(inferType(e));
    return statusOk&&impOk&&chOk&&typeOk;
  });
  const SORT_FN = {"상태":e=>getStatus(e.startDate,e.endDate).label,"중요도":e=>e.importance,"채널":e=>e.channel,"유형":e=>e.eventType||"","쿠폰(%)":e=>Number(e.coupon)||0,"쿠폰부담":e=>e.couponBurden||"","행사명":e=>e.name,"담당자":e=>e.manager||"","시작일":e=>e.startDate,"종료일":e=>e.endDate,"기간":e=>e.startDate,"목표매출":e=>Number(e.targetSales)||0,"실매출":e=>Number(e.actualSales)||0,"달성률":e=>e.targetSales&&e.actualSales?Number(e.actualSales)/Number(e.targetSales):0,"비고":e=>e.note||"","경로":e=>e.path||""};
  if(sortKey&&SORT_FN[sortKey]){
    rows=[...rows].sort((a,b)=>{const fn=SORT_FN[sortKey];const av=fn(a),bv=fn(b);const r=typeof av==="number"?av-bv:String(av).localeCompare(String(bv),"ko");return sortDir==="asc"?r:-r;});
  } else {
    rows = [...rows].sort((a,b)=>{
      if(listSort==="imp") return (b.importance||"1").localeCompare(a.importance||"1");
      if(listSort==="channel") return a.channel.localeCompare(b.channel);
      return a.startDate.localeCompare(b.startDate);
    });
  }

  const toggleSort = (h) => { if(sortKey===h){setSortDir(d=>d==='asc'?'desc':'asc');}else{setSortKey(h);setSortDir('asc');} };
  const closeCell = () => { setEditCell(null); setCellCal(null); };
  const saveCell = (id,field,val) => {
    const next=events.map(x=>x.id===id?{...x,[field]:val}:x);
    if(saveEvents) saveEvents(next); else saveLS(LS_EVENTS,next);
    return next;
  };

  const SBtn = ({v,lbl}) => (
    <button onClick={()=>setListSort(v)} style={{padding:"4px 10px",borderRadius:6,border:"none",fontSize:11,fontWeight:700,cursor:"pointer",background:listSort===v?bc.tag:"#e8ecf4",color:listSort===v?"#fff":"#667"}}>{lbl}</button>
  );
  const FBtn = ({v,lbl,col}) => {
    const isAll=v==="all", active=isAll?statusF.length===0:statusF.includes(v);
    return <button onClick={()=>{
      if(isAll){setStatusF([]);return;}
      setStatusF(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v]);
    }} style={{padding:"3px 9px",borderRadius:6,border:`1.5px solid ${active?(col||bc.tag):"#dde"}`,fontSize:10,fontWeight:700,cursor:"pointer",background:active?(col||bc.tag)+"15":"#fff",color:active?(col||bc.tag):"#889"}}>{lbl}</button>;
  };
  const ChFBtn = ({ch}) => {
    const active=chF.includes(ch);
    const ci=chanNames.indexOf(ch);
    const c=cc(ci<0?0:ci);
    return <button onClick={()=>setChF(p=>p.includes(ch)?p.filter(x=>x!==ch):[...p,ch])} style={{padding:"3px 9px",borderRadius:6,border:`1.5px solid ${active?c:"#dde"}`,fontSize:10,fontWeight:700,cursor:"pointer",background:active?c+"15":"#fff",color:active?c:"#889"}}>{ch}</button>;
  };

  const downloadUploadTemplate = () => {
    const headers = ["브랜드","채널","행사명","유형","시작일","종료일","쿠폰(%)","쿠폰부담","담당자","중요도","목표매출","실매출","비고","경로"];
    const guide = [
      ["[브랜드] 시티브리즈 또는 아티드","[채널] 자사몰/29CM/W컨셉/무신사/지그재그/브론테/롯데온/하고/EQL/네이버/MKT 등",
       "[행사명] 예: 26SS 발매","[유형] 기획전/할인/발매/콜라보 등","[시작일] YYYY-MM-DD 형식","[종료일] YYYY-MM-DD 형식",

      const target=ev.targetSales||"",actual=ev.actualSales||"";

            const eType = EVENT_TYPES.find(o=>o.val===ev.eventType)?.lbl||""; 
      const cBurden = COUPON_BURDEN.find(o=>o.val===ev.couponBurden)?.lbl||""; 
      return [ev.brand,ev.channel,ev.name,eType,ev.startDate,ev.endDate,dur,ev.coupon||"",cBurden,ev.manager||"",imp,target,actual,rate,st,ev.note||""];

    XLSX.utils.book_append_sheet(wb,wsAll,"전체");
    DEFAULT_BRANDS.forEach(b=>{

  function InlineCellCal({evId,field,currentVal,otherVal,onSave}) {

          <span style={{fontSize:11,fontWeight:700,color:"#334"}}>{y}년 {m+1}월</span>

          {cells2.map((d2,i)=>{
            if(!d2) return <div key={"e"+i}/>;
            const dk=`${y}-${String(m+1).padStart(2,"0")}-${String(d2).padStart(2,"0")}`;
            const isSel=dk===currentVal,isOther=dk===otherVal;
            const dow=new Date(y,m,d2).getDay();
            return (
              <div key={d2} onClick={()=>{onSave(evId,field,dk);setCellCal(null);}}
                style={{padding:"3px 0",borderRadius:3,cursor:"pointer",fontSize:10,fontWeight:isSel?800:400,background:isSel?bc.tag:"transparent",color:isSel?"#fff":isOther?bc.tag:dow===0?"#e05c5c":dow===6?"#4f6ef7":"#334",border:isOther?`1px solid ${bc.tag}`:"none"}}>{d2}</div>

                const hdr=arr[0]||[];
                const dataStart=hdr[0]==="브랜드"?1:hdr[1]==="브랜드"?2:1;
                const newEvs=arr.slice(dataStart).filter(r=>r[0]&&r[2]).map((r,i)=>({

                      </EditableCell>
                      <td style={{padding:"6px 10px",textAlign:"center",cursor:"pointer",position:"relative",borderLeft:"2px solid #d8dff0"}} onClick={e=>{e.stopPropagation();setCellCal({id:ev.id,field:"startDate"});}}>
                        <span style={{color:"#556",fontWeight:600,fontSize:11}}>{ev.startDate}</span>
                        {hasCal("startDate")&&<InlineCellCal evId={ev.id} field="startDate" currentVal={ev.startDate} otherVal={ev.endDate} onSave={(id,f,v)=>{const n=saveCell(id,f,v);}} />}
                      </td>
                      <td style={{padding:"6px 10px",textAlign:"center",cursor:"pointer",position:"relative"}} onClick={e=>{e.stopPropagation();setCellCal({id:ev.id,field:"endDate"});}}>
                        <span style={{color:"#556",fontWeight:600,fontSize:11}}>{ev.endDate}</span>
                        {hasCal("endDate")&&<InlineCellCal evId={ev.id} field="endDate" currentVal={ev.endDate} otherVal={ev.startDate} onSave={(id,f,v)=>{const n=saveCell(id,f,v);}} />}
                      </td>
                      <EditableCell field="dur" style={{cursor:"default"}}>
                        <span style={{color:"#889",fontSize:11}}>{dur?`${dur}일`:"-"}</span>
                      </EditableCell>
                      <EditableCell field="targetSales" style={{borderLeft:"2px solid #d8dff0"}}>
                        {isEditing("targetSales")
                          ?<input autoFocus type="number" defaultValue={ev.targetSales||""} onBlur={e=>{saveCell(ev.id,"targetSales",e.target.value);closeCell();}} style={{width:100,padding:"4px 6px",borderRadius:6,border:`1.5px solid ${bc.tag}`,fontSize:11}}/>
                          :<span style={{color:"#556",fontWeight:600,fontSize:11}}>{ev.targetSales?Number(ev.targetSales).toLocaleString()+"원":"-"}</span>
                        }
                      </EditableCell>
                      <EditableCell field="actualSales">
                        <input key={ev.id} defaultValue={ev.actualSales||""} inputMode="numeric" placeholder="-"
                          onBlur={e=>{const v=e.target.value.replace(/[^0-9]/g,"");e.target.value=v;saveCell(ev.id,"actualSales",v);}}
                          onClick={e=>e.stopPropagation()}
                          style={{width:90,padding:"3px 6px",borderRadius:4,border:"1px solid #dde",fontSize:11,textAlign:"right"}}/>
                      </EditableCell>
                      <EditableCell field="rate" style={{cursor:"default"}}>
                        {ev.targetSales&&ev.actualSales?(()=>{
                          const rate=Math.round(Number(ev.actualSales)/Number(ev.targetSales)*100);
                          const col=rate>=100?"#27ae60":rate>=80?"#f4a233":"#e53935";
                          const bg=rate>=100?"#e8f8ee":rate>=80?"#fff8e8":"#fff0f0";
                          return <span style={{fontWeight:800,color:col,fontSize:11,background:bg,borderRadius:6,padding:"2px 8px",display:"inline-flex",alignItems:"center",gap:3}}>
                            <span style={{display:"inline-block",width:10,height:10,borderRadius:"50%",background:col,flexShrink:0}}/>
                            {rate}%
                          </span>;
                        })():<span style={{color:"#ddd",fontSize:14}}>○</span>}
                      </EditableCell>
                      <td style={{padding:"6px 8px",textAlign:"center",whiteSpace:"nowrap",borderLeft:"2px solid #d8dff0"}} onClick={e=>e.stopPropagation()}>
                        <button onClick={e=>{e.stopPropagation();openEdit(ev);}} style={{background:"#eef1fb",border:"none",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:11,color:"#4f6ef7",fontWeight:700,marginRight:4}}>수정</button>
                        <button onClick={e=>{e.stopPropagation();if(confirm("삭제할까요?")){if(saveEvents)saveEvents(events.filter(x=>x.id!==ev.id));else saveLS(LS_EVENTS,events.filter(x=>x.id!==ev.id));}}} style={{background:"#ffe8e8",border:"none",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:11,color:"#e04",fontWeight:700}}>삭제</button>
                      </td>
                      <td style={{padding:"6px 10px",textAlign:"left",borderLeft:"1px solid #e8ecf4",cursor:"pointer",position:"relative",minWidth:120}} onClick={e=>{e.stopPropagation();setEditCell({id:ev.id,field:"note"});}}>
                        {isEditing("note")
                          ?<textarea autoFocus defaultValue={ev.note||""} onBlur={e=>{saveCell(ev.id,"note",e.target.value);closeCell();}}
                            style={{width:180,height:70,padding:"5px 8px",borderRadius:6,border:`1.5px solid ${bc.tag}`,fontSize:11,resize:"vertical"}}/>
                          :<span style={{fontSize:10,color:ev.note?"#445":"#ccd",display:"block",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",maxWidth:160}}>{ev.note||""}</span>
                        }
                      </td>
                      <td style={{padding:"6px 10px",textAlign:"left",borderLeft:"1px solid #e8ecf4",cursor:"pointer",position:"relative",minWidth:120}} onClick={e=>{e.stopPropagation();setEditCell({id:ev.id,field:"path"});}}>
                        {isEditing("path")
                          ?<textarea autoFocus defaultValue={ev.path||""} onBlur={e=>{saveCell(ev.id,"path",e.target.value);closeCell();}}
                            style={{width:180,height:70,padding:"5px 8px",borderRadius:6,border:`1.5px solid ${bc.tag}`,fontSize:11,resize:"vertical"}}/>
                          :<span style={{fontSize:10,color:ev.path?"#445":"#ccd",display:"block",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",maxWidth:160}}>{ev.path||""}</span>
                        }
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        }
      </>}
    </div>
  );
}

// ── KPIBanner (대시보드) ──────────────────────────────
function KPIBanner({events,brand,bc,chanNames,viewMonth}) {
  const [upTab,setUpTab] = useState("week");
  const [editingActual,setEditingActual] = useState(false);
  const [actualInput,setActualInput] = useState("");
  const realMonth = new Date().getMonth();
  const curMonth = (!viewMonth||viewMonth===0) ? realMonth : viewMonth-1;
  const curMonthStr = `2026-${String(curMonth+1).padStart(2,"0")}`;

  // ── 경영계획 월 목표 ──────────────────────────────────────
  const MONTHLY_GOAL = {
    "시티브리즈": [1871000000,1488000000,2080000000,2133000000,1881000000,2730000000,1480000000,989000000,2328000000,2275000000,3021000000,2350000000],
    "아티드":     [807000000,1069000000,1068000000,990000000,979000000,1131000000,817000000,649000000,1219000000,1630000000,1871000000,1241000000],
  };
  const monthlyGoal = brand==="전체"
    ? (MONTHLY_GOAL["시티브리즈"][curMonth]||0)+(MONTHLY_GOAL["아티드"][curMonth]||0)
    : (MONTHLY_GOAL[brand]?.[curMonth]||0);

  // ── 월 실적 (직접 입력 or 프리셋) ────────────────────────
  const actualKey = `monthly_actual_${brand}_${curMonth}`;
  const getActual = (b,m) => {
    try{ const v=localStorage.getItem(`monthly_actual_${b}_${m}`); if(v) return Number(v); }catch(e){}
    return (MONTHLY_ACTUAL_PRESET[b]||[])[m] ?? null;
  };
  const [monthlyActual,setMonthlyActual] = useState(()=>getActual(brand,curMonth));
  React.useEffect(()=>{
    setMonthlyActual(getActual(brand,curMonth));
    setEditingActual(false);
  },[brand,curMonth]);
  const saveActual = () => {
    const n = Number(actualInput.replace(/,/g,""));
    if(!isNaN(n)&&n>=0){
      try{ localStorage.setItem(actualKey,String(n)); }catch(e){}
      setMonthlyActual(n);
    }
    setEditingActual(false);
  };

  const isAnnual = !viewMonth || viewMonth===0;
  const brandEvs = events.filter(e=>brand==="전체"||e.brand===brand);
  const monthEvs = brandEvs.filter(e=>e.startDate.startsWith(curMonthStr)||e.endDate.startsWith(curMonthStr)||(e.startDate<curMonthStr&&e.endDate>=curMonthStr+"-01"));

  // 전체 연간 누적 계산
  const annualMonthlyGoal = isAnnual
    ? Array.from({length:12},(_,m)=>brand==="전체"
        ? (MONTHLY_GOAL["시티브리즈"][m]||0)+(MONTHLY_GOAL["아티드"][m]||0)
        : (MONTHLY_GOAL[brand]?.[m]||0)
      ).reduce((s,v)=>s+v,0)
    : monthlyGoal;
  const annualMonthlyActual = isAnnual
    ? Array.from({length:12},(_,m)=>getActual(brand,m)||0).reduce((s,v)=>s+v,0)||null
    : monthlyActual;
  const dispGoal   = isAnnual ? annualMonthlyGoal   : monthlyGoal;
  const dispActual = isAnnual ? annualMonthlyActual : monthlyActual;

  // 행사 목표 / 행사 실적 (연간이면 전체, 월간이면 해당 월)
  const annualEvs  = isAnnual ? brandEvs : monthEvs;
  const eventTarget = annualEvs.reduce((s,e)=>s+Number(e.targetSales||0),0);
  const eventActual = annualEvs.reduce((s,e)=>s+Number(e.actualSales||0),0);

  // 달성률 2가지
  const goalRate  = (dispGoal>0&&dispActual!=null) ? Math.round(dispActual/dispGoal*100) : null;
  const eventRate = eventTarget>0 ? Math.round(eventActual/eventTarget*100) : null;
  const goalRateCol  = goalRate===null ?"#ccc":goalRate>=100 ?"#27ae60":goalRate>=80 ?"#f4a233":"#e53935";
  const eventRateCol = eventRate===null?"#ccc":eventRate>=100?"#27ae60":eventRate>=80?"#f4a233":"#e53935";
  // (legacy compat)
  const totalTarget=eventTarget, totalActual=eventActual;
  const achieveRate=eventRate, rateCol=eventRateCol;
  const today=new Date(TODAY), tmr=new Date(TODAY); tmr.setDate(tmr.getDate()+1);
  const weekEnd=new Date(TODAY); weekEnd.setDate(weekEnd.getDate()+7);
  const upcomingFilter=(e)=>{
    const sd=parseDt(e.startDate);
    if(!sd) return false;
    if(upTab==="today") return e.startDate===TODAY;
    if(upTab==="tmr") return e.startDate===tmr.toISOString().slice(0,10);
    return sd>=today&&sd<=weekEnd;
  };
  const tabEvs = brandEvs.filter(upcomingFilter).sort((a,b)=>a.startDate.localeCompare(b.startDate));
  const grouped = tabEvs.reduce((acc,ev)=>{ const last=acc[acc.length-1]; if(last&&last.date===ev.startDate)last.evs.push(ev);else acc.push({date:ev.startDate,evs:[ev]}); return acc; },[]);
  const todayCnt=brandEvs.filter(e=>e.startDate===TODAY).length;
  const tmrCnt=brandEvs.filter(e=>e.startDate===tmr.toISOString().slice(0,10)).length;
  const weekCnt=brandEvs.filter(e=>{const sd=parseDt(e.startDate);return sd&&sd>=today&&sd<=weekEnd;}).length;
  const tabCnt={today:todayCnt,tmr:tmrCnt,week:weekCnt};
  const chanAchieve = chanNames.map(ch=>{
    const cev=brandEvs.filter(e=>e.channel===ch&&e.targetSales);
    if(!cev.length) return null;
    const tgt=cev.reduce((s,e)=>s+Number(e.targetSales),0);
    const act=cev.filter(e=>e.actualSales).reduce((s,e)=>s+Number(e.actualSales),0);
    const rate=Math.round(act/tgt*100);
    const ci=chanNames.indexOf(ch);
    return {ch,tgt,act,rate,c:cc(ci<0?0:ci)};
  }).filter(Boolean);
  const highlights = brandEvs.filter(e=>{
    const m=e.startDate.slice(0,7);
    return m===curMonthStr&&(e.importance==="3"||e.importance==="2");
  }).sort((a,b)=>b.importance.localeCompare(a.importance));
  const heatData = Array.from({length:12},(_,m)=>{
    const ms=`2026-${String(m+1).padStart(2,"0")}`;
    return brandEvs.filter(e=>e.startDate.startsWith(ms)||e.endDate.startsWith(ms)||(e.startDate<ms&&e.endDate>=ms+"-01")).length;
  });
  const heatMax = Math.max(...heatData,1);

  return (
    <div style={{margin:"0 0 18px",display:"flex",flexDirection:"column",gap:12}}>
      {/* Row1: KPI + 7일 */}
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        {/* KPI */}
        <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 10px #0001",padding:"18px 22px",flex:"1 1 300px",minWidth:280}}>
          <div style={{fontSize:10,fontWeight:800,color:"#aaa",letterSpacing:1.5,marginBottom:14}}>{isAnnual?"연간 누적 실적":curMonth+1+"월 실적"}</div>

          {/* 월 목표 / 월 실적 */}
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <div style={{flex:1,background:"#f8f9fc",borderRadius:8,padding:"8px 10px"}}>
              <div style={{fontSize:8,color:"#aaa",marginBottom:3,fontWeight:700}}>월 목표</div>
              <div style={{fontSize:14,fontWeight:900,color:"#556"}}>{dispGoal>0?fmt(dispGoal):"-"}</div>
            </div>
            <div style={{flex:1,background:"#f8f9fc",borderRadius:8,padding:"8px 10px",cursor:"pointer"}} onClick={()=>{if(!isAnnual){setActualInput(dispActual!=null?String(dispActual):"");setEditingActual(true);}}}>
              <div style={{fontSize:8,color:"#aaa",marginBottom:3,fontWeight:700}}>{isAnnual?"누적 실적":"월 실적"}{!isAnnual&&<span style={{color:bc.tag,fontSize:7}}>  클릭 입력</span>}</div>
              {editingActual
                ? <div style={{display:"flex",gap:4}} onClick={e=>e.stopPropagation()}>
                    <input autoFocus value={actualInput} onChange={e=>setActualInput(e.target.value)}
                      onKeyDown={e=>{if(e.key==="Enter")saveActual();if(e.key==="Escape")setEditingActual(false);}}
                      placeholder="금액 입력" style={{flex:1,border:"1.5px solid "+bc.tag,borderRadius:5,padding:"2px 6px",fontSize:11,width:"100%",outline:"none"}}/>
                    <button onClick={saveActual} style={{padding:"2px 8px",borderRadius:5,border:"none",background:bc.tag,color:"#fff",fontSize:10,fontWeight:700,cursor:"pointer"}}>저장</button>
                  </div>
                : <div style={{fontSize:14,fontWeight:900,color:dispActual!=null?"#334":"#ccc"}}>{dispActual!=null?fmt(dispActual):(isAnnual?"-":"- 미입력")}</div>
              }
            </div>
          </div>

          {/* 행사 목표 / 행사 실적 */}
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <div style={{flex:1,background:"#f0f4ff",borderRadius:8,padding:"8px 10px"}}>
              <div style={{fontSize:8,color:"#aaa",marginBottom:3,fontWeight:700}}> 행사 목표</div>
              <div style={{fontSize:14,fontWeight:900,color:"#667"}}>{eventTarget>0?fmt(eventTarget):"-"}</div>
            </div>
            <div style={{flex:1,background:"#f0f4ff",borderRadius:8,padding:"8px 10px"}}>
              <div style={{fontSize:8,color:"#aaa",marginBottom:3,fontWeight:700}}>행사 실적</div>
              <div style={{fontSize:14,fontWeight:900,color:eventActual>0?"#334":"#ccc"}}>{eventActual>0?fmt(eventActual):"-"}</div>
            </div>
          </div>

          {/* 달성률 2가지 */}
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            {[{lbl:"월목표 달성률",rate:goalRate,col:goalRateCol},
              {lbl:"행사목표 달성률",rate:eventRate,col:eventRateCol},
            ].map(({lbl,rate,col})=>(
              <div key={lbl} style={{flex:1,borderRadius:8,padding:"8px 10px",border:`1.5px solid ${col}33`,background:col+"0d"}}>
                <div style={{fontSize:8,color:"#aaa",marginBottom:3,fontWeight:700}}>{lbl}</div>
                <div style={{fontSize:22,fontWeight:900,color:col,lineHeight:1}}>{rate!==null?`${rate}%`:"-"}</div>
                <div style={{height:3,background:"#e8ecf4",borderRadius:2,overflow:"hidden",marginTop:5}}>
                  {rate!==null&&<div style={{height:"100%",width:`${Math.min(rate,100)}%`,background:col,borderRadius:2}}/>}
                </div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:0,borderTop:"1px solid #f0f2f8",paddingTop:10}}>
            {[{lbl:isAnnual?"연간":curMonth+1+"월",val:annualEvs.length+"건",col:"#445"},
              {lbl:"진행중",val:annualEvs.filter(e=>getStatus(e.startDate,e.endDate).label==="진행중").length+"건",col:"#27ae60"},
              {lbl:"예정",val:annualEvs.filter(e=>getStatus(e.startDate,e.endDate).label==="예정").length+"건",col:"#4f6ef7"},
              {lbl:"종료",val:annualEvs.filter(e=>getStatus(e.startDate,e.endDate).label==="종료").length+"건",col:"#bbb"},
            ].map(({lbl,val,col},i)=>(
              <div key={lbl} style={{flex:1,textAlign:"center",borderLeft:i>0?"1px solid #f0f2f8":"none"}}>
                <div style={{fontSize:15,fontWeight:900,color:col}}>{val}</div>
                <div style={{fontSize:9,color:"#bbb",marginTop:1}}>{lbl}</div>
              </div>
            ))}
          </div>
        </div>
        {/* 7일 예정 */}
        <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 10px #0001",padding:"18px 20px",flex:"1 1 240px",minWidth:220,display:"flex",flexDirection:"column"}}>
          <div style={{fontSize:10,fontWeight:800,color:"#aaa",letterSpacing:1.5,marginBottom:10}}> 다음 7일 예정</div>
          <div style={{display:"flex",gap:4,marginBottom:12}}>
            {[{k:"today",lbl:"오늘"},{k:"tmr",lbl:"내일"},{k:"week",lbl:"이번 주"}].map(({k,lbl})=>(
              <button key={k} onClick={()=>setUpTab(k)}
                style={{flex:1,padding:"6px 0",borderRadius:8,border:"none",fontSize:11,fontWeight:700,cursor:"pointer",background:upTab===k?bc.tag:"#f2f4fb",color:upTab===k?"#fff":"#889",position:"relative"}}>
                {lbl}
                {tabCnt[k]>0&&<span style={{position:"absolute",top:-4,right:4,background:upTab===k?"#fff":bc.tag,color:upTab===k?bc.tag:"#fff",borderRadius:8,padding:"0 5px",fontSize:9,fontWeight:900}}>{tabCnt[k]}</span>}
              </button>
            ))}
          </div>
          <div style={{flex:1,overflowY:"auto",maxHeight:200}}>
            {tabEvs.length===0
              ?<div style={{color:"#dde",fontSize:12,textAlign:"center",padding:"20px 0"}}>예정 행사 없음</div>
              :<div style={{display:"flex",flexDirection:"column",gap:0}}>
                {grouped.map(({date,evs},gi)=>{
                  const d=new Date(date);
                  const dow=d.getDay();
                  const diff=Math.round((new Date(date)-today)/86400000);
                  const dayLbl=diff===0?"오늘":diff===1?"내일":WEEK[dow]+"요일";
                  return (
                    <div key={date}>
                      {upTab==="week"&&(
                        <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0 3px",marginTop:gi>0?4:0}}>
                          <span style={{fontSize:10,fontWeight:800,color:diff===0?"#4f6ef7":dow===0?"#e05":"#667",whiteSpace:"nowrap"}}>
                            {diff===0&&<span style={{background:"#4f6ef7",color:"#fff",borderRadius:3,padding:"1px 5px",fontSize:8,marginRight:3}}>TODAY</span>}
                            {date.slice(5)} {dayLbl}
                          </span>
                          <div style={{flex:1,height:1,background:"#edf0f6"}}/>
                        </div>
                      )}
                      {evs.map(ev=>{
                        const ci=chanNames.indexOf(ev.channel),c=cc(ci<0?0:ci);
                        return (
                          <div key={ev.id} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 7px",borderRadius:7,cursor:"pointer",marginBottom:1}}
                            onMouseEnter={e=>e.currentTarget.style.background="#f0f4ff"}
                            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                            <span style={{width:3,height:24,borderRadius:2,background:c,flexShrink:0}}/>
                            <span style={{fontSize:10,fontWeight:800,color:c,minWidth:42,flexShrink:0}}>{ev.channel}</span>
                            <span style={{fontSize:11,fontWeight:600,color:"#334",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.name}</span>
                            {ev.importance&&ev.importance!=="0"&&<span style={{fontSize:9,flexShrink:0}}>{IMP_STAR[ev.importance]}</span>}
                            {ev.coupon&&<span style={{fontSize:9,color:"#ff6b35",fontWeight:700,flexShrink:0}}>{ev.coupon}%</span>}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            }
          </div>
        </div>
      </div>
      {/* Row2: 채널달성 + 하이라이트 */}
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        {chanAchieve.length>0&&(
          <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 10px #0001",padding:"18px 20px",flex:"1 1 240px"}}>
            <div style={{fontSize:10,fontWeight:800,color:"#aaa",letterSpacing:1.5,marginBottom:12}}>채널별 행사 달성률</div>
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              {chanAchieve.map(({ch,tgt,act,rate,c})=>{
                const rc=rate>=100?"#27ae60":rate>=80?"#f4a233":"#e53935";
                return (
                  <div key={ch}>
                    <div style={{display:"flex",alignItems:"center",marginBottom:3}}>
                      <span style={{fontSize:11,fontWeight:700,color:"#445",flex:1}}>{ch}</span>
                      <span style={{fontSize:10,color:"#aaa",marginRight:8}}>{fmt(act)}/{fmt(tgt)}</span>
                      <span style={{fontSize:11,fontWeight:900,color:rc,minWidth:32,textAlign:"right"}}>{rate}%</span>
                    </div>
                    <div style={{height:5,background:"#f0f2f8",borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${Math.min(rate,100)}%`,background:`linear-gradient(90deg,${c}77,${rc})`}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {highlights.length>0&&(
          <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 10px #0001",padding:"18px 20px",flex:"2 1 320px"}}>
            <div style={{fontSize:10,fontWeight:800,color:"#aaa",letterSpacing:1.5,marginBottom:12}}> {curMonth+1}월 주요 행사</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {highlights.map(ev=>{
                const ci=chanNames.indexOf(ev.channel),c=cc(ci<0?0:ci);
                const st=getStatus(ev.startDate,ev.endDate);
                const isL=ev.importance==="L";
                const ac=isL?"#8b5cf6":c;
                return (
                  <div key={ev.id} style={{flex:"1 1 140px",minWidth:130,maxWidth:200,borderRadius:10,border:`1.5px solid ${ac}22`,padding:"10px 12px",position:"relative",background:ac+"07",cursor:"pointer"}}
                    onMouseEnter={e=>e.currentTarget.style.background=ac+"14"}
                    onMouseLeave={e=>e.currentTarget.style.background=ac+"07"}>
                    <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${ac},${ac}44)`,borderRadius:"10px 10px 0 0"}}/>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,alignItems:"center"}}>
                      <span style={{fontSize:9,fontWeight:800,color:ac,background:ac+"18",borderRadius:3,padding:"1px 5px"}}>{ev.channel}</span>
                      <span style={{fontSize:8,background:st.bg,color:st.color,borderRadius:8,padding:"1px 5px",fontWeight:700}}>{st.label}</span>
                    </div>
                    <div style={{fontSize:12,fontWeight:800,color:"#334",marginBottom:4,lineHeight:1.3}}>{ev.name}</div>
                    <div style={{fontSize:9,color:"#aaa"}}>{ev.startDate.slice(5)} ~ {ev.endDate.slice(5)}</div>
                    {ev.coupon&&<div style={{fontSize:9,color:"#ff6b35",fontWeight:700,marginTop:2}}>{ev.coupon}%쿠폰</div>}
                    <div style={{position:"absolute",bottom:6,right:8,fontSize:18,opacity:0.1}}>{isL?"L":"★"}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
      {/* Row3: 히트맵 */}
      <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 10px #0001",padding:"18px 22px"}}>
        <div style={{fontSize:10,fontWeight:800,color:"#aaa",letterSpacing:1.5,marginBottom:14}}> 2026 월별 행사 현황</div>
        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
          {heatData.map((cnt,m)=>{
            const intensity=cnt===0?0:Math.max(0.12,cnt/heatMax);
            const isCur=m===curMonth;
            const mc=bc.tag;
            return (
              <div key={m} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                <div style={{width:"100%",position:"relative",height:60,display:"flex",alignItems:"flex-end"}}>
                  <div style={{width:"100%",height:`${cnt===0?4:Math.max(8,Math.round(intensity*60))}px`,background:cnt===0?"#f0f2f8":`${mc}${Math.round(intensity*255).toString(16).padStart(2,"0")}`,borderRadius:"4px 4px 0 0",border:isCur?`2px solid ${mc}`:"none",position:"relative"}}>
                    {cnt>0&&<div style={{position:"absolute",top:-18,left:"50%",transform:"translateX(-50%)",fontSize:10,fontWeight:800,color:mc,whiteSpace:"nowrap"}}>{cnt}</div>}
                  </div>
                </div>
                <div style={{fontSize:10,fontWeight:isCur?800:600,color:isCur?mc:"#889"}}>{m+1}월</div>
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:4,alignItems:"center",marginTop:10,justifyContent:"flex-end"}}>
          <span style={{fontSize:9,color:"#bbb"}}>적음</span>
          {[0.15,0.35,0.55,0.75,1].map(v=>(
            <div key={v} style={{width:14,height:8,borderRadius:2,background:`${bc.tag}${Math.round(v*255).toString(16).padStart(2,"0")}`}}/>
          ))}
          <span style={{fontSize:9,color:"#bbb"}}>많음</span>
        </div>
      </div>
    </div>
  );
}
