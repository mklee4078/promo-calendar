        {/* Firebase 상태 */}
        <div style={{display:"flex",alignItems:"center",gap:5,background:"#ffffff15",borderRadius:8,padding:"5px 12px"}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:fbStatus==="ok"?"#2ecc71":fbStatus==="error"?"#e74c3c":fbStatus==="connecting"?"#f39c12":"#95a5a6",flexShrink:0}}/>
          <span style={{fontSize:10,color:"#ffffffcc",fontWeight:600}}>
            {fbSaving?"저장 중...":fbStatus==="ok"?"실시간 연동":fbStatus==="error"?"저장 오류":fbStatus==="connecting"?"연결 중...":"로컬 모드"}
          </span>
        </div>
        <button onClick={openWeekly} style={{background:"#ffffff22",border:"2px solid #ffffff55",borderRadius:10,padding:"7px 16px",color:"#fff",fontSize:12,fontWeight:800,cursor:"pointer"}}>주간회의</button>
        <button onClick={exportAll} style={{background:"#ffffff22",border:"2px solid #ffffff55",borderRadius:10,padding:"7px 16px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>엑셀</button>
        <button onClick={openAdd} style={{background:"#fff",color:bc.tag,border:"none",borderRadius:10,padding:"8px 18px",fontWeight:800,fontSize:14,cursor:"pointer",boxShadow:"0 2px 8px #0002"}}>+ 행사 추가</button>
      </div>

      {/* 내비 탭 */}
      <div style={{position:"sticky",top:60,zIndex:200,background:"#f0f2f8",borderBottom:"1px solid #dde4f0"}}>
        {/* 1행: 전체연간 + 채널대시보드 */}
        <div style={{padding:"8px 22px 0",display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={()=>setViewMonth(0)} style={{padding:"5px 16px",borderRadius:20,border:"none",fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",background:viewMonth===0?bc.tag:"#e0e4f0",color:viewMonth===0?"#fff":"#667"}}>전체 연간</button>
          <div style={{width:1,height:18,background:"#d0d8f0",margin:"0 4px"}}/>
          <div style={{position:"relative"}} ref={dashDropRef}>
            <button onClick={e=>{const r=e.currentTarget.getBoundingClientRect();setDashDropPos({top:r.bottom+4,left:r.left});setDashDrop(p=>!p);}}
              style={{padding:"5px 16px",borderRadius:20,border:"none",fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",
                background:[15,16,17,18,19].includes(viewMonth)?"#e67e22":"#e0e4f0",
                color:[15,16,17,18,19].includes(viewMonth)?"#fff":"#667"}}>
              {[15,16,17,18,19].includes(viewMonth)?`채널 대시보드 · ${["자사몰","29CM","W컨셉","무신사","지그재그"][viewMonth-15]}`:"채널 대시보드 ▾"}
            </button>
            {dashDrop&&(
              <div style={{position:"fixed",top:dashDropPos.top,left:dashDropPos.left,background:"#fff",borderRadius:10,boxShadow:"0 8px 30px #0003",zIndex:9999,minWidth:150,overflow:"hidden",border:"1px solid #e0e4f0"}}>
                {[["자사몰",15],["29CM",16],["W컨셉",17],["무신사",18],["지그재그",19]].map(([ch,vm])=>(
                  <div key={vm} onClick={()=>{setViewMonth(vm);setDashDrop(false);}}
                    style={{padding:"10px 18px",cursor:"pointer",fontSize:12,fontWeight:700,
                      background:viewMonth===vm?"#fff4ec":"#fff",
                      color:viewMonth===vm?"#e67e22":"#334",
                      borderBottom:"1px solid #f4f6fb"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#fff4ec"}
                    onMouseLeave={e=>e.currentTarget.style.background=viewMonth===vm?"#fff4ec":"#fff"}>
                    {ch}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
        {/* 2행: 채널 대시보드 선택 시 숨김 */}
        {![15,16,17,18,19].includes(viewMonth)&&(
        <div style={{padding:"6px 22px 8px",display:"flex",gap:6,overflowX:"auto",alignItems:"center"}}>
          {MONTH_NAMES.map((mn,i)=>(
            <button key={mn} onClick={()=>setViewMonth(i+1)} style={{padding:"5px 12px",borderRadius:20,border:"none",fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",background:viewMonth===i+1?bc.tag:"#e8ecf4",color:viewMonth===i+1?"#fff":"#667"}}>{mn}</button>
          ))}
          <div style={{width:1,height:18,background:"#d0d8f0",margin:"0 4px",flexShrink:0}}/>
          <button onClick={()=>setViewMonth(13)} style={{padding:"5px 14px",borderRadius:20,border:"none",fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",background:viewMonth===13?bc.tag:"#e8ecf4",color:viewMonth===13?"#fff":"#667"}}>전체 행사목록</button>
          <button onClick={()=>setViewMonth(14)} style={{padding:"5px 14px",borderRadius:20,border:"none",fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",background:viewMonth===14?"#27ae60":"#e8ecf4",color:viewMonth===14?"#fff":"#667"}}>담당자 관리</button>
        </div>
        )}
      </div>

      {/* 본문 */}
      <div style={{padding:"0 0 48px"}}>
        <div style={{padding:"22px 22px 0"}}>
          {[15,16,17,18,19].includes(viewMonth)
            ? <ChannelDashboard
                channel={["자사몰","29CM","W컨셉","무신사","지그재그"][viewMonth-15]}
                events={events} brand={brand} bc={bc}
                jasaMemos={jasaMemos} saveJasaMemo={saveJasaMemo}
                channelStrats={channelStrats} setChannelStrats={setChannelStrats} saveStrat={saveStrat}/>
            : viewMonth===14
            ? <ManagerTab managers={managers} events={events} saveManagers={saveManagers} saveEvents={saveEvents} bc={bc} chanNames={chanNames}/>
            : viewMonth===13
              ? <EventList events={events} brand={brand} channels={channels} chanNames={chanNames} bc={bc} collapsed={collapsed} toggleCollapse={toggleCollapse} openEdit={openEdit} openQuick={openQuick} saveLS={(k,v)=>saveEvents(v)} saveEvents={saveEvents} managers={managers}/>
              : <>
                  <KPIBanner events={events} brand={brand} bc={bc} chanNames={chanNames} viewMonth={viewMonth}/>
                  {(()=>{
                    const calFiltered = events.filter(e=>{
                      const brOk   = calBrF.length===0   || calBrF.includes(e.brand);
                      const chOk   = calChF.length===0   || calChF.includes(e.channel);
                      const impOk  = calImpF.length===0  || calImpF.includes(e.importance);
                      const stOk   = calStF.length===0   || calStF.includes(getStatus(e.startDate,e.endDate).label);
                      const typeOk = calTypeF.length===0 || calTypeF.includes(inferType(e));
                      return brOk && chOk && impOk && stOk && typeOk;
                    });
                    const allChs = [...new Set(events.filter(e=>brand==="전체"||e.brand===brand).map(e=>e.channel))];
                    const impOptions = [{v:"3",lbl:"⭐⭐⭐"},{v:"2",lbl:"⭐⭐"},{v:"1",lbl:"⭐"}];
                    const stOptions  = [{v:"진행중",lbl:"진행중",c:"#27ae60"},{v:"예정",lbl:"예정",c:"#4f6ef7"},{v:"종료",lbl:"종료",c:"#bbb"}];
                    const brOptions  = [{v:"시티브리즈",lbl:"시티브리즈",c:BRAND_COLORS["시티브리즈"].tag},{v:"아티드",lbl:"아티드",c:BRAND_COLORS["아티드"].tag}];
                    const anyActive  = calBrF.length>0||calChF.length>0||calImpF.length>0||calStF.length>0||calTypeF.length>0;
                    const Div = () => <div style={{width:1,height:16,background:"#e0e4f0",margin:"0 2px"}}/>;
                    const FilterBar = () => (
                      <div style={{background:"#fff",borderRadius:10,padding:"10px 14px",marginBottom:10,boxShadow:"0 1px 6px #0001",display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
                        <span style={{fontSize:10,fontWeight:800,color:"#aaa",flexShrink:0}}>필터</span>
                        {/* 브랜드 */}
                        {brand==="전체"&&<><Div/>{brOptions.map(({v,lbl,c})=>{
                          const active=calBrF.includes(v);
                          return <button key={v} onClick={()=>setCalBrF(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v])}
                            style={{padding:"3px 9px",borderRadius:6,border:`1.5px solid ${active?c:"#dde"}`,fontSize:10,fontWeight:700,cursor:"pointer",background:active?c+"20":"#fff",color:active?c:"#889"}}>{lbl}</button>;
                        })}</>}
                        {/* 상태 */}
                        <Div/>
                        {stOptions.map(({v,lbl,c})=>{
                          const active=calStF.includes(v);
                          return <button key={v} onClick={()=>setCalStF(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v])}
                            style={{padding:"3px 9px",borderRadius:6,border:`1.5px solid ${active?c:"#dde"}`,fontSize:10,fontWeight:700,cursor:"pointer",background:active?c+"20":"#fff",color:active?c:"#889"}}>{lbl}</button>;
                        })}
                        {/* 중요도 */}
                        <Div/>
                        {impOptions.map(({v,lbl})=>{
                          const active=calImpF.includes(v);
                          const c=IMP_COLOR[v]||"#889";
                          return <button key={v} onClick={()=>setCalImpF(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v])}
                            style={{padding:"3px 9px",borderRadius:6,border:`1.5px solid ${active?c:"#dde"}`,fontSize:10,fontWeight:700,cursor:"pointer",background:active?c+"20":"#fff",color:active?c:"#889"}}>{lbl}</button>;
                        })}
                        {/* 행사 유형 */}
                        <Div/>
                        {EVENT_TYPES.filter(o=>o.val).map(({val,lbl,c})=>{
                          const active=calTypeF.includes(val);
                          return <button key={val} onClick={()=>setCalTypeF(p=>p.includes(val)?p.filter(x=>x!==val):[...p,val])}
                            style={{padding:"3px 9px",borderRadius:6,border:`1.5px solid ${active?c:"#dde"}`,fontSize:10,fontWeight:700,cursor:"pointer",background:active?c+"20":"#fff",color:active?c:"#889"}}>{lbl}</button>;
                        })}
                        {/* 채널 */}
                        <Div/>
                        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                          {allChs.map(ch=>{
                            const active=calChF.includes(ch);
                            const ci=chanNames.indexOf(ch); const c=cc(ci<0?0:ci);
                            return <button key={ch} onClick={()=>setCalChF(p=>p.includes(ch)?p.filter(x=>x!==ch):[...p,ch])}
                              style={{padding:"3px 9px",borderRadius:6,border:`1.5px solid ${active?c:"#dde"}`,fontSize:10,fontWeight:700,cursor:"pointer",background:active?c+"20":"#fff",color:active?c:"#889"}}>{ch}</button>;
                          })}
                        </div>
                        {anyActive&&
                          <button onClick={()=>{setCalBrF([]);setCalChF([]);setCalImpF([]);setCalStF([]);setCalTypeF([]);}} style={{marginLeft:"auto",padding:"3px 10px",borderRadius:6,border:"1.5px solid #e53935",fontSize:10,fontWeight:700,cursor:"pointer",background:"#fff",color:"#e53935",flexShrink:0}}>✕ 초기화</button>
                        }
                      </div>
                    );
                    return viewMonth===0
                    ? <><FilterBar/><div style={{display:"flex",flexDirection:"column",gap:18}}>
                        {Array.from({length:12},(_,m)=>m).map(m=>(
                          <MonthView key={m} month={m} events={calFiltered} brand={brand} chanNames={chanNames} bc={bc} collapsed={collapsed} toggleCollapse={toggleCollapse} openEdit={openQuick}/>
                        ))}
                      </div></>
                    : <><FilterBar/><MonthView month={viewMonth-1} events={calFiltered} brand={brand} chanNames={chanNames} bc={bc} collapsed={collapsed} toggleCollapse={toggleCollapse} openEdit={openQuick}/>
                        <ChannelView month={viewMonth-1} events={calFiltered} brand={brand} channels={channels} chanNames={chanNames} bc={bc} collapsed={collapsed} toggleCollapse={toggleCollapse} openEdit={openQuick}/></>
                  })()}
                </>
          }
        </div>
      </div>

      {/* 주간회의 모달 */}
      {weeklyModal&&(
        <div onClick={()=>setWeeklyModal(false)} style={{position:"fixed",inset:0,background:"#00000055",zIndex:900,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,boxShadow:"0 8px 40px #0004",width:"min(600px,95vw)",maxHeight:"80vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{background:`linear-gradient(135deg,${bc.tag},${bc.border}99)`,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontWeight:800,fontSize:15,color:"#fff"}}>주간회의 자료</div>
                <div style={{fontSize:10,color:"#ffffffaa",marginTop:2}}>진행중 + 31일 이내 예정 · 채널별 최대 5건</div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button onClick={copyWeekly} style={{background:copied?"#27ae60":"#fff",color:copied?"#fff":bc.tag,border:"none",borderRadius:8,padding:"7px 16px",fontWeight:800,fontSize:13,cursor:"pointer",transition:"all 0.2s"}}>
                  {copied?"복사됨!":"복사"}
                </button>
                <button onClick={()=>setWeeklyModal(false)} style={{background:"#ffffff33",border:"none",borderRadius:8,padding:"7px 12px",color:"#fff",fontSize:16,cursor:"pointer",fontWeight:700}}>✕</button>
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
              <textarea value={weeklyText} onChange={e=>setWeeklyText(e.target.value)}
                style={{width:"100%",height:"100%",minHeight:320,border:"1.5px solid #e0e5f0",borderRadius:10,padding:"12px 14px",fontSize:12,lineHeight:1.7,fontFamily:"'Noto Sans KR',monospace",resize:"none",outline:"none",background:"#fafbff",color:"#334",boxSizing:"border-box"}}/>
            </div>
            <div style={{padding:"10px 20px",borderTop:"1px solid #f0f2f8",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,color:"#aaa"}}>직접 수정 후 복사해도 됩니다</span>
              <button onClick={copyWeekly} style={{background:copied?"#27ae60":bc.tag,color:"#fff",border:"none",borderRadius:8,padding:"8px 20px",fontWeight:800,fontSize:13,cursor:"pointer"}}>
                {copied?"복사 완료!":"클립보드에 복사"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 행사 폼 */}
      {showForm&&<FormModal form={form} setForm={setForm} editId={editId} chanNames={chanNames} bc={bc} onSave={save} onDelete={()=>del(editId)} onClose={()=>setShowForm(false)} managers={managers}/>}

      {/* 빠른 수정 패널 */}
      {quickEv&&<QuickEditPanel ev={quickEv} bc={bc} chanNames={chanNames}
        onClose={()=>setQuickEv(null)}
        onFullEdit={ev=>{setEditId(ev.id);setForm({...ev});setShowForm(true);setQuickEv(null);}}
        onSave={ev=>{
          const next=events.map(x=>x.id===ev.id?ev:x);
          saveEvents(next); setQuickEv(ev);
        }}
        onDelete={id=>del(id)}
      />}
    </div>
  );
}

function exportAll() {
  alert("행사 목록 탭에서 엑셀 다운로드를 이용해주세요.");
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
